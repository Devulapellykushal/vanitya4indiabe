version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: vanitya-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vanitya
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vanitya-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vanitya-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vanitya-network

  # Node.js Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vanitya-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: vanitya
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vanitya
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8000
      JWT_SECRET: dev-jwt-secret-change-in-production
      SARVAM_API_KEY: ${SARVAM_API_KEY:-your_sarvam_api_key}
      SARVAM_CREDITS_THRESHOLD: 50
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-your_firebase_api_key}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-your_firebase_project_id}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-your_google_web_client_id}
      QUESTIONS_PER_UNIT: 10
      HEARTS_PER_USER: 5
      STORAGE_BACKEND: local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./uploads:/app/uploads
    networks:
      - vanitya-network

  # Python ML Service
  ml-service:
    profiles:
      - ml
    build:
      context: ./vanitya-ml
      dockerfile: Dockerfile
    container_name: vanitya-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: vanitya
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vanitya
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./vanitya-ml/src:/app/src
      - ./vanitya-ml/storage:/app/storage
      - ./vanitya-ml/logs:/app/logs
    networks:
      - vanitya-network

  # Optional: Adminer for Database UI (Development only)
  adminer:
    image: adminer:4.8.1
    container_name: vanitya-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - vanitya-network
    profiles:
      - dev

networks:
  vanitya-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: