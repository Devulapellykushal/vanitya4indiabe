apiVersion: v1
kind: Namespace
metadata:
  name: vanitya
  labels:
    name: vanitya
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vanitya-backend
  namespace: vanitya
  labels:
    app: vanitya-backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vanitya-backend
  template:
    metadata:
      labels:
        app: vanitya-backend
        version: v1
    spec:
      containers:
      - name: vanitya-backend
        image: vanitya/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vanitya-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: vanitya-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: vanitya-secrets
              key: jwt-secret
        - name: SARVAM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vanitya-secrets
              key: sarvam-api-key
        - name: AI4BHARAT_API_KEY
          valueFrom:
            secretKeyRef:
              name: vanitya-secrets
              key: ai4bharat-api-key
        - name: AKSHARAMUKHA_API_KEY
          valueFrom:
            secretKeyRef:
              name: vanitya-secrets
              key: aksharamukha-api-key
        - name: ML_SERVICE_URL
          value: "http://vanitya-ml-service:8000"
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: vanitya-config
              key: cors-origin
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: vanitya-backend-service
  namespace: vanitya
  labels:
    app: vanitya-backend
spec:
  selector:
    app: vanitya-backend
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vanitya-backend-ingress
  namespace: vanitya
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.vanitya.com
    secretName: vanitya-backend-tls
  rules:
  - host: api.vanitya.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vanitya-backend-service
            port:
              number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vanitya-config
  namespace: vanitya
data:
  cors-origin: "https://vanitya.com,https://app.vanitya.com"
  supported-languages: "hi,te,kn,ta,ml,en"
  default-source-language: "hi"
  default-target-language: "te"
  game-hearts-initial: "5"
  upload-max-file-size: "10485760"
---
apiVersion: v1
kind: Secret
metadata:
  name: vanitya-secrets
  namespace: vanitya
type: Opaque
data:
  # Base64 encoded secrets (replace with actual values)
  database-url: <BASE64_ENCODED_DATABASE_URL>
  redis-url: <BASE64_ENCODED_REDIS_URL>
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
  sarvam-api-key: <BASE64_ENCODED_SARVAM_API_KEY>
  ai4bharat-api-key: <BASE64_ENCODED_AI4BHARAT_API_KEY>
  aksharamukha-api-key: <BASE64_ENCODED_AKSHARAMUKHA_API_KEY>
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vanitya-backend-hpa
  namespace: vanitya
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vanitya-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vanitya-backend-pdb
  namespace: vanitya
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vanitya-backend