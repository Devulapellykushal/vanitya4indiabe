version: '3.8'

services:
  # Vanitya Backend API
  vanitya-backend:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: production
    container_name: vanitya-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/vanitya
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SARVAM_API_KEY: ${SARVAM_API_KEY}
      AI4BHARAT_API_KEY: ${AI4BHARAT_API_KEY}
      AKSHARAMUKHA_API_KEY: ${AKSHARAMUKHA_API_KEY}
      ML_SERVICE_URL: http://vanitya-ml:8000
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vanitya-network
    volumes:
      - /var/log/vanitya:/var/log/vanitya
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vanitya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vanitya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/init:/docker-entrypoint-initdb.d
    networks:
      - vanitya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vanitya"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vanitya-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vanitya-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vanitya-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - vanitya-backend
    networks:
      - vanitya-network

networks:
  vanitya-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local